  </div>
  <div class="mastery-grid" id="mastery-grid">
    <div class="m-card" data-ch="ch0"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FCEBEB;color:#A32D2D;">0.1</div><div class="m-meta"><div class="m-title">0.1 — Functions</div><div class="m-sub">Function notation · domain · range · piecewise · difference quotient</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Evaluate f(a), f(x+h), f(g(x))</li><li>Find domain of radical and rational functions</li><li>Simplify [f(x+h)−f(x)]/h fully before canceling h</li></ul><div class="why-box">Foundation of all calculus. The difference quotient becomes the derivative definition in 2.2.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Not canceling h after expanding the difference quotient</li><li>Wrong domain: √x requires x≥0, ln x requires x>0</li><li>Confusing f(x+h) with f(x)+h</li></ul><div class="tip-box">Write out f(x+h) fully by substituting (x+h) everywhere x appears. Then subtract f(x) and simplify before touching h.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch0"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FCEBEB;color:#A32D2D;">0.2</div><div class="m-meta"><div class="m-title">0.2 — Transformations</div><div class="m-sub">Shifts · stretches · reflections · composition of functions</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Graph y=−2f(x−3)+1 from f(x)</li><li>Compute (f∘g)(x) and determine its domain</li><li>Distinguish f(g(x)) from g(f(x))</li></ul><div class="why-box">Composition is the structure behind the Chain Rule (2.6). Transformations reappear in curve sketching (4.1–4.3).</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Horizontal shift direction: x−3 shifts RIGHT, not left</li><li>Applying vertical and horizontal changes in wrong order</li><li>Forgetting domain restrictions in composition</li></ul><div class="tip-box">For composition: work inside-out — evaluate g(x) first, then feed result into f.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch0"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FCEBEB;color:#A32D2D;">0.3</div><div class="m-meta"><div class="m-title">0.3 — Families of Functions</div><div class="m-sub">Power · trig · exponential · log · piecewise · absolute value</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Recognize and sketch y=x^n, y=|x|, y=sinx, y=cosx, y=e^x, y=lnx by shape</li><li>Identify domain, range, intercepts, asymptotes for each family</li><li>Evaluate piecewise functions at boundary points from both sides</li><li>Determine if a piecewise function is continuous at each boundary</li></ul><div class="why-box">Function families are the visual vocabulary of calculus. Recognizing shapes instantly speeds up limit problems, curve sketching, and integration decisions.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing domain of ln x (x>0) with domain of √x (x≥0)</li><li>Thinking |x| is differentiable at x=0 — it is not</li><li>Evaluating piecewise at boundary using wrong piece</li></ul><div class="tip-box">For any unfamiliar function: find domain first. Then find x-intercepts, y-intercept, asymptotes. Then sketch. This 4-step order never fails.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch0"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FCEBEB;color:#A32D2D;">0.4</div><div class="m-meta"><div class="m-title">0.4 — Inverse Functions</div><div class="m-sub">One-to-one · finding f⁻¹(x) · domain/range swap · inverse trig principal ranges</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Find f⁻¹(x) algebraically by swapping x and y</li><li>Apply horizontal line test</li><li>State principal ranges: arcsin [−π/2,π/2], arccos [0,π], arctan (−π/2, π/2) — open interval, endpoints excluded</li></ul><div class="why-box">Needed for implicit differentiation (3.1) and inverse trig derivatives (3.3).</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing f⁻¹(x) with 1/f(x)</li><li>Forgetting to restrict domain before inverting</li><li>Wrong principal range for arccos — it is [0,π] not [−π/2,π/2]</li></ul><div class="tip-box">To find f⁻¹: replace f(x) with y, swap x and y, solve for y. Check domain restriction first.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch0"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FCEBEB;color:#A32D2D;">0.5</div><div class="m-meta"><div class="m-title">0.5 — Exponential &amp; Log Functions</div><div class="m-sub">Log laws · e^x and ln x as inverses · solving equations</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Solve ln(x−1)+ln(x+2)=ln10 (check for extraneous solutions)</li><li>Simplify e^(ln x)=x and ln(e^x)=x instantly</li><li>Convert between log bases and sketch e^x and ln x</li></ul><div class="why-box">e^x and ln x appear throughout Early Transcendentals. Needed for log derivatives (3.2) and exp derivatives (3.3).</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Treating ln(a+b) as ln a + ln b — this is WRONG</li><li>Not checking for extraneous solutions after solving log equations</li><li>Forgetting domain restriction x>0 for ln x</li></ul><div class="tip-box">For log equations: combine logs using laws, exponentiate both sides. Always check solutions in the original equation.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch1"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">1.1</div><div class="m-meta"><div class="m-title">1.1 — Limits (Intuitive Approach)</div><div class="m-sub">One-sided limits · two-sided limits · existence · graphical reading</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Read lim f(x) as x→a from a graph — distinguish from f(a)</li><li>Compute one-sided limits: lim⁺ and lim⁻ separately</li><li>State when a two-sided limit exists: left limit = right limit</li><li>Identify when a limit is ∞, −∞, or does not exist (DNE)</li></ul><div class="why-box">Limit intuition is the foundation of the derivative definition in 2.2. Every derivative is a limit.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing lim f(x) as x→a with f(a) — the limit ignores what happens AT a</li><li>If both one-sided limits equal +∞, write limit = +∞ (not DNE); if one is +∞ and other is −∞, then DNE</li><li>Reading the function value instead of the limit from a graph</li></ul><div class="tip-box">The limit asks: what value does f(x) approach as x gets close to a? What f(a) equals is completely irrelevant to the limit.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch1"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">1.2</div><div class="m-meta"><div class="m-title">1.2 — Computing Limits</div><div class="m-sub">Direct substitution · 0/0 form · factoring · rationalizing · Squeeze Theorem</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Recognize 0/0 and know it needs more algebra</li><li>Factor and cancel polynomial limits</li><li>Rationalize conjugates: (√a−√b)(√a+√b)=a−b</li><li>Know lim sin(x)/x = 1 and lim (1−cos x)/x = 0 as x→0</li></ul><div class="why-box">The derivative definition in 2.2 is itself a 0/0 form: [f(x+h)−f(x)]/h as h→0.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Writing lim sin(x)/x = 0 instead of 1 — extremely common error</li><li>Canceling before fully factoring</li><li>Sign errors in conjugate expansion</li></ul><div class="tip-box">Step 1: always try direct substitution. If 0/0 — stop. Factor or rationalize. Cancel. Substitute again.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch1"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">1.3</div><div class="m-meta"><div class="m-title">1.3 — Limits at Infinity</div><div class="m-sub">End behavior · horizontal asymptotes · dominant terms · ∞/∞ forms</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>lim(x→∞) of rational functions — divide by highest power of x</li><li>Identify horizontal asymptotes from limits at ±∞</li><li>Evaluate lim(x→∞) e^x, e^(−x), ln x, x^n</li><li>Recognize dominant growth rates: ln x ≪ x^n ≪ e^x</li></ul><div class="why-box">Limits at infinity determine horizontal asymptotes and end behavior — both needed for curve sketching in 4.1–4.3.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Dividing by wrong power — always divide by highest power in denominator</li><li>Saying lim(x→∞) sinx exists — it does not (oscillates)</li><li>Forgetting that e^(−x) → 0 as x → ∞</li></ul><div class="tip-box">For rational functions: factor out highest power of x from numerator and denominator. Everything else goes to 0 or cancels.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch1"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">1.4</div><div class="m-meta"><div class="m-title">1.4 — ε-δ Definition of Limit</div><div class="m-sub">Formal definition · finding δ given ε · proof structure</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>State the definition: for every ε>0, ∃δ>0 such that 0&lt;|x−a|&lt;δ ⟹ |f(x)−L|&lt;ε</li><li>Find δ in terms of ε for simple linear functions</li><li>Understand why the definition ignores x=a</li><li>Identify the "scratch work" phase vs the proof phase</li></ul><div class="why-box">ε-δ appears on HW tests as a proof question. Understanding the structure — not memorizing — is what matters.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing ε (output tolerance) with δ (input tolerance)</li><li>Choosing δ that depends on x — δ can depend on ε and the center point a, but NOT on x</li><li>Writing the proof in wrong order (backward from scratch work)</li></ul><div class="tip-box">Scratch work: start with |f(x)−L|&lt;ε and work backward to find δ. Then write the actual proof forward: assume |x−a|&lt;δ, conclude |f(x)−L|&lt;ε.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch1"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">1.5</div><div class="m-meta"><div class="m-title">1.5 — Continuity</div><div class="m-sub">Three conditions · discontinuity types · IVT · piecewise continuity</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Check all 3 conditions at a specific point</li><li>Classify: removable (hole), jump, infinite discontinuity</li><li>Find k so that piecewise function is continuous</li><li>State and apply IVT to prove a root exists</li></ul><div class="why-box">Continuity is required for EVT (4.4), MVT (4.8), and FTC (5.6). Non-negotiable.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Checking only one or two of the three conditions</li><li>Saying continuous because limit exists — limit must also EQUAL f(a)</li><li>Applying IVT without verifying continuity on the closed interval</li></ul><div class="tip-box">For piecewise: at each boundary compute left limit, right limit, and f(boundary) separately. All three must match.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch1"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">1.6</div><div class="m-meta"><div class="m-title">1.6 — Continuity of Trig, Exp &amp; Inverse</div><div class="m-sub">Continuity of sin/cos/e^x/ln x · compositions · IVT applications</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>State that sin, cos, e^x are continuous everywhere; ln x continuous for x>0</li><li>Determine continuity of composite functions using continuity of components</li><li>Apply IVT: if f continuous on [a,b] and f(a)&lt;0&lt;f(b), ∃c with f(c)=0</li><li>Use IVT to prove a root exists in an interval</li></ul><div class="why-box">IVT is the theoretical justification for root-finding methods like Newton's Method (4.7) and is directly testable on HW exams.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Applying IVT without verifying continuity on the closed interval</li><li>Concluding the root is unique — IVT only guarantees existence</li><li>Forgetting that tan x has discontinuities at π/2 + nπ</li></ul><div class="tip-box">IVT checklist: (1) continuous on [a,b]? (2) do f(a) and f(b) have opposite signs? If both yes → root guaranteed in (a,b).</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch2"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">2.1</div><div class="m-meta"><div class="m-title">2.1 — Tangent Lines &amp; Rates of Change</div><div class="m-sub">Slope of tangent · average vs instantaneous rate · secant to tangent</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Average rate of change = (f(b)−f(a))/(b−a) — this is slope of secant line</li><li>Instantaneous rate = lim(h→0) [f(a+h)−f(a)]/h — slope of tangent</li><li>Write equation of tangent line: y−f(a) = f'(a)(x−a)</li><li>Interpret rate of change in context (velocity, growth rate)</li></ul><div class="why-box">This section is the conceptual bridge between limits and derivatives. The derivative definition in 2.2 is exactly this limit.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Using average rate when instantaneous rate is asked</li><li>Forgetting to evaluate f'(a) at the specific point a for tangent slope</li><li>Writing tangent line through (0, f(a)) instead of (a, f(a))</li></ul><div class="tip-box">Tangent line: slope = f'(a), passes through (a, f(a)). Always plug in x=a to get both the slope AND the y-coordinate of the point.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch2"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">2.2</div><div class="m-meta"><div class="m-title">2.2 — The Derivative Function</div><div class="m-sub">Limit definition · differentiability · f' from graph · non-differentiable points</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Compute f'(x) from definition: lim(h→0) [f(x+h)−f(x)]/h</li><li>Identify where f is not differentiable: corners, cusps, vertical tangents, discontinuities</li><li>Sketch f' given graph of f — f' is positive where f increases</li><li>Interpret f'(a)>0 (increasing), f'(a)&lt;0 (decreasing), f'(a)=0 (flat)</li></ul><div class="why-box">The definition ties Ch.1 limits to all of Ch.2–Ch.4. HW exams test definition-based derivatives and graphical interpretation.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Not simplifying [f(x+h)−f(x)]/h before taking limit — must cancel h</li><li>Claiming differentiable at corners — differentiability requires smooth tangent</li><li>Drawing f' positive where f is concave up — concavity is about f'', not f'</li></ul><div class="tip-box">Non-differentiable signals: corner (f' jumps), cusp (f'→±∞), vertical tangent (f'=∞), discontinuity (no limit). Check these first before computing.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch2"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">2.3–2.4</div><div class="m-meta"><div class="m-title">2.3–2.4 — Differentiation Rules</div><div class="m-sub">Power rule · product rule · quotient rule</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Differentiate any polynomial instantly</li><li>Rewrite √x as x^(1/2), 1/x as x^(−1) before power rule</li><li>Apply product rule: d/dx[fg]=f'g+fg'</li><li>Apply quotient rule: d/dx[f/g]=(f'g−fg')/g²</li></ul><div class="why-box">Power rule automation is the baseline. Slow differentiation here compounds in every later problem.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Reversing quotient rule numerator order: must be (f'g−fg') not (fg'−f'g)</li><li>Not rewriting radicals and fractions as powers first</li><li>Forgetting to square the denominator in quotient rule</li></ul><div class="tip-box">Write the formula before substituting. Label f, g, f', g' clearly before plugging in.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch2"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">2.5</div><div class="m-meta"><div class="m-title">2.5 — Derivatives of Trig Functions</div><div class="m-sub">6 trig derivatives · combined with product/quotient/chain rules</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>d/dx[sinx]=cosx, d/dx[cosx]=−sinx</li><li>d/dx[tanx]=sec²x, d/dx[cotx]=−csc²x</li><li>d/dx[secx]=secx·tanx, d/dx[cscx]=−cscx·cotx</li><li>Combine with Chain Rule: d/dx[sin(3x²)] = cos(3x²)·6x</li><li>Combine with Product Rule: d/dx[x²·sinx]</li></ul><div class="why-box">Trig derivatives are used in every chapter from here forward. They must be automatic — no lookup during exams.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>d/dx[cosx] = +sinx — WRONG, it is −sinx</li><li>Forgetting negative signs on cot, csc derivatives</li><li>Forgetting Chain Rule multiplier on trig of a function</li></ul><div class="tip-box">Memorize in pairs: sin/cos (one negative), tan/sec, cot/csc (both negative). The "co" functions always carry a negative sign.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch2"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FCEBEB;color:#A32D2D;">2.6 ★</div><div class="m-meta"><div class="m-title">2.6 — Chain Rule (Most Critical)</div><div class="m-sub">d/dx[f(g(x))]=f'(g(x))·g'(x) — everything in Ch.3 and Ch.4 depends on this</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>d/dx sin(3x²+1) = cos(3x²+1)·6x</li><li>d/dx e^(x²) = e^(x²)·2x</li><li>d/dx ln(cos x) = (1/cos x)·(−sin x)</li><li>d/dx (x²+1)^5 = 5(x²+1)^4·2x</li><li>Combined with product rule: d/dx x²·sin(3x)</li></ul><div class="why-box">Chain Rule is the foundation of implicit diff (3.1), related rates (3.4), and ALL integration techniques in Ch.7. Be honest with yourself before moving past it.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting to multiply by the inner derivative — most common error in all differentiation</li><li>Not identifying outer and inner functions first</li><li>Stopping at f'(g(x)) without multiplying by g'(x)</li></ul><div class="tip-box">Protocol: What is the OUTER function? What is the INNER function? Differentiate outer (leaving inner unchanged), then multiply by derivative of inner.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch3"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">3.1</div><div class="m-meta"><div class="m-title">3.1 — Implicit Differentiation</div><div class="m-sub">Treating y as function of x · dy/dx · tangent lines to implicit curves</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Differentiate x²+y²=25 with respect to x</li><li>Handle product terms like xy using product rule</li><li>Find tangent line to implicitly defined curve</li></ul><div class="why-box">Requires Chain Rule fluency from 2.6. Used in related rates (3.4).</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting Chain Rule on y terms: d/dx[y²]=2y·(dy/dx) not 2y</li><li>Differentiating only one side of the equation</li><li>Not solving for dy/dx at the end</li></ul><div class="tip-box">Every time you differentiate a y term, write ·(dy/dx). Then collect all dy/dx terms on one side and solve.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch3"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">3.2</div><div class="m-meta"><div class="m-title">3.2 — Derivatives of Log Functions</div><div class="m-sub">d/dx[ln x]=1/x · d/dx[ln|f(x)|]=f'(x)/f(x) · logarithmic differentiation</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>d/dx[ln(x²+1)] = 2x/(x²+1) using Chain Rule</li><li>d/dx[ln|sec x|] = tan x</li><li>Logarithmic differentiation for y = x^x or products of many terms</li><li>d/dx[log_a(x)] = 1/(x·ln a)</li></ul><div class="why-box">Log derivatives appear in every integration technique in Ch.7 — ∫(1/x)dx = ln|x|+C is the foundation.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Writing d/dx[ln(f(x))] = 1/f(x) — must multiply by f'(x)</li><li>Forgetting absolute value in ln|x|</li><li>Using log base 10 rules instead of natural log</li></ul><div class="tip-box">Every log derivative: d/dx[ln(f(x))] = f'(x)/f(x). Always Chain Rule.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch3"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">3.3</div><div class="m-meta"><div class="m-title">3.3 — Derivatives of Exp &amp; Inverse Trig</div><div class="m-sub">d/dx[e^x]=e^x · d/dx[a^x]=a^x·ln a · arcsin/arctan/arcsec</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>d/dx[e^(3x²)] = e^(3x²)·6x</li><li>d/dx[2^x] = 2^x·ln 2</li><li>d/dx[arcsin(x)] = 1/√(1−x²)</li><li>d/dx[arctan(x)] = 1/(1+x²)</li><li>d/dx[arctan(f(x))] = f'(x)/(1+f(x)²)</li></ul><div class="why-box">Inverse trig derivatives reappear in Ch.7 trig substitution results and partial fractions.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting Chain Rule on e^(f(x))</li><li>Confusing arcsin and arccos derivatives — arccos has a negative sign</li><li>Mixing up arcsin and arctan formulas</li></ul><div class="tip-box">Memorize 3 inverse trig derivatives: arcsin→1/√(1−x²), arctan→1/(1+x²), arcsec→1/(|x|√(x²−1)).</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch3"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">3.4</div><div class="m-meta"><div class="m-title">3.4 — Related Rates</div><div class="m-sub">Implicit differentiation with respect to time · diagram first · substitute last</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Draw a diagram and define all variables</li><li>Write one equation relating the quantities</li><li>Differentiate both sides with respect to t</li><li>Substitute given values ONLY after differentiating</li></ul><div class="why-box">Common on HW exams. Applies Chain Rule and implicit differentiation to real-world problems.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Substituting given values BEFORE differentiating — most common error</li><li>Not drawing a diagram first</li><li>Forgetting dx/dt or dy/dt on changing quantities</li></ul><div class="tip-box">4-step protocol: diagram → equation → differentiate w.r.t. t → substitute values LAST.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch3"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">3.5</div><div class="m-meta"><div class="m-title">3.5 — Local Linear Approximation</div><div class="m-sub">Linearization L(x) · differentials dy · error estimation</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>L(x) = f(a) + f'(a)(x−a) — tangent line used as approximation</li><li>Approximate f(a+Δx) ≈ f(a) + f'(a)·Δx for small Δx</li><li>Compute differential dy = f'(x)dx</li><li>Use differentials to estimate propagated error</li></ul><div class="why-box">Linear approximation is the practical application of the tangent line. Differentials reappear in u-substitution (du = g'(x)dx) throughout Ch.5 and Ch.7.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Using L(x) far from x=a where approximation breaks down</li><li>Confusing Δy (actual change) with dy (approximate change)</li><li>Forgetting to evaluate f'(a) at the base point a, not at x</li></ul><div class="tip-box">L(x) is just the tangent line equation. Approximation is good only near x=a. The further from a, the worse it gets.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch3"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">3.6</div><div class="m-meta"><div class="m-title">3.6 — L'Hôpital's Rule</div><div class="m-sub">0/0 and ∞/∞ indeterminate forms · repeated application · other forms</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Verify 0/0 or ∞/∞ form before applying — never apply without checking</li><li>Apply: lim f(x)/g(x) = lim f'(x)/g'(x) when form is 0/0 or ∞/∞</li><li>Apply repeatedly if result is still indeterminate</li><li>Convert 0·∞, ∞−∞, 1^∞, 0^0 to 0/0 or ∞/∞ before applying</li></ul><div class="why-box">L'Hôpital's Rule resolves the most difficult limit problems in Ch.1 and is used to evaluate improper integrals in 7.8.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Applying L'Hôpital without verifying indeterminate form first</li><li>Using quotient rule instead of differentiating numerator and denominator separately</li><li>Forgetting to convert 0·∞ form: rewrite as fraction first</li></ul><div class="tip-box">L'Hôpital differentiates numerator and denominator SEPARATELY — it is not the quotient rule. Always verify the form is 0/0 or ∞/∞ first.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch4"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">4.1–4.3</div><div class="m-meta"><div class="m-title">4.1–4.3 — Curve Sketching</div><div class="m-sub">Sign charts for f' and f'' · extrema · concavity · asymptotes</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Build sign chart for f' and f'' with all critical numbers</li><li>Identify intervals of increase/decrease and concavity</li><li>Locate inflection points where f'' changes sign</li><li>Classify cusps and vertical tangents from f' behavior</li></ul><div class="why-box">Combines limits at infinity (1.3), continuity (1.5), and all derivative rules into a complete picture.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Saying increasing where f''>0 — that is concavity, not increase</li><li>Listing inflection points where f''=0 without checking sign actually changes</li><li>Confusing a hole with a vertical asymptote</li></ul><div class="tip-box">Checklist: domain → intercepts → asymptotes → sign chart for f' → sign chart for f'' → sketch.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch4"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">4.4</div><div class="m-meta"><div class="m-title">4.4 — Absolute Maxima &amp; Minima</div><div class="m-sub">Extreme Value Theorem · closed interval method · global vs local</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>State EVT: continuous f on [a,b] attains absolute max and min</li><li>Closed interval method: find all critical numbers + evaluate endpoints</li><li>Distinguish absolute (global) extrema from relative (local) extrema</li><li>Find absolute extrema on open or infinite intervals using limits</li></ul><div class="why-box">Absolute extrema problems are among the most common on HW exams. Forgetting to check endpoints is the #1 source of lost points.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting to evaluate f at the ENDPOINTS — most common exam error</li><li>Assuming critical number = absolute extremum without comparing all values</li><li>Applying closed interval method on open intervals where EVT doesn't apply</li></ul><div class="tip-box">Closed interval method: (1) find all x where f'=0 or f' undefined. (2) evaluate f at each + both endpoints. (3) compare all values. Largest = abs max, smallest = abs min.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch4"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">4.5</div><div class="m-meta"><div class="m-title">4.5 — Optimization</div><div class="m-sub">Objective function · constraint · reducing to one variable · verify critical point</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Define all variables clearly</li><li>Write the objective function (what to maximize/minimize)</li><li>Use the constraint to eliminate one variable</li><li>Verify the critical point gives a max or min in context</li></ul><div class="why-box">One of the most common and difficult exam topics. Requires all previous skills plus problem-setup discipline.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Substituting the constraint before writing the objective function</li><li>Not checking the nature of the critical point</li><li>Forgetting domain restrictions in context</li></ul><div class="tip-box">4-step protocol: define variables → write objective → substitute constraint → find and verify critical point.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch4"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">4.6</div><div class="m-meta"><div class="m-title">4.6 — Rectilinear Motion</div><div class="m-sub">Position · velocity · acceleration · speed · direction of motion</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>v(t) = s'(t), a(t) = v'(t) = s''(t)</li><li>Speed = |v(t)| — always non-negative</li><li>Object moving right when v(t)>0, left when v(t)&lt;0</li><li>Object speeding up when v and a have same sign; slowing down when opposite signs</li></ul><div class="why-box">Rectilinear motion connects derivatives to physical interpretation. The same framework extends to vector motion in Ch.12.6.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing speed (|v|) with velocity (v) — speed is never negative</li><li>Saying acceleration = speeding up — acceleration is a vector, not a description</li><li>Finding when v=0 and claiming that is when object stops permanently</li></ul><div class="tip-box">Speeding up/slowing down: check if v and a have the SAME sign (speeding up) or OPPOSITE signs (slowing down). Sign of a alone tells you nothing.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch4"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">4.8</div><div class="m-meta"><div class="m-title">4.8 — Mean Value Theorem</div><div class="m-sub">Rolle's Theorem · MVT statement · finding c · applications</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>State MVT: if f continuous on [a,b] and differentiable on (a,b), then ∃c: f'(c)=(f(b)−f(a))/(b−a)</li><li>Verify the two hypotheses before applying</li><li>Find the value c guaranteed by MVT</li><li>Apply Rolle's Theorem as special case (f(a)=f(b))</li></ul><div class="why-box">MVT justifies increase/decrease tests in 4.1 and is used to prove FTC in 5.6.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Applying MVT without verifying hypotheses first</li><li>Confusing (f(b)−f(a))/(b−a) with f'(a) or f'(b)</li><li>Forgetting c must be in the OPEN interval (a,b)</li></ul><div class="tip-box">MVT: average rate of change over [a,b] equals instantaneous rate at some interior point c. Draw the secant line — one tangent must be parallel to it.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch5"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">5.2</div><div class="m-meta"><div class="m-title">5.2 — The Indefinite Integral</div><div class="m-sub">Antiderivative · +C · basic integral formulas · initial value problems</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>∫x^n dx = x^(n+1)/(n+1) + C for n ≠ −1</li><li>∫(1/x) dx = ln|x| + C</li><li>∫e^x dx = e^x + C, ∫sinx dx = −cosx + C, ∫cosx dx = sinx + C</li><li>Solve initial value problems: find C using given condition f(a)=b</li></ul><div class="why-box">Basic integral formulas are to integration what power rule is to differentiation — the absolute starting point for everything in Ch.5 and Ch.7.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting +C on every indefinite integral</li><li>∫x^(−1) dx = ln|x| + C, NOT x^0/0 (undefined) — special case</li><li>∫sinx dx = −cosx + C — the negative sign is frequently dropped</li></ul><div class="tip-box">Check every antiderivative by differentiating your answer. If d/dx[F(x)] = f(x), the integral is correct.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch5"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">5.3</div><div class="m-meta"><div class="m-title">5.3 — U-Substitution</div><div class="m-sub">u=g(x) · du=g'(x)dx · rewrite entirely in u · back-substitute</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Choose u correctly (usually the inner function)</li><li>Compute du and rewrite entire integral in u</li><li>Evaluate in u and substitute back to x</li><li>Change limits for definite integrals</li></ul><div class="why-box">U-substitution is the integration counterpart of the Chain Rule. If the Chain Rule created it, u-sub undoes it.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Leaving a mix of x and u in the integral</li><li>Forgetting to change limits for definite integrals</li><li>Choosing u that does not simplify the integral</li></ul><div class="tip-box">Look for a function and its derivative in the integrand. Let u be the inner function. Verify du matches the remaining factor.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch5"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">5.4–5.5</div><div class="m-meta"><div class="m-title">5.4–5.5 — Riemann Sums &amp; Definite Integral</div><div class="m-sub">Sigma notation · Riemann sum setup · definite integral properties</div></div><div class="m-tooltip">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Set up left, right, midpoint Riemann sums for given n</li><li>Use sigma notation: Σᵢ₌₁ⁿ f(xᵢ*)·Δx</li><li>Apply definite integral properties: linearity, interval additivity, comparison</li><li>Interpret ∫ₐᵇ f(x)dx as signed area between f and x-axis</li></ul><div class="why-box">Riemann sums are the conceptual foundation of the integral. FTC in 5.6 is the shortcut — but understanding why it works requires Riemann sums.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing signed area with total area — negative regions subtract</li><li>Wrong Δx: always (b−a)/n, not (b−a)/(n−1)</li><li>Misidentifying xᵢ for left, right, or midpoint rules</li></ul><div class="tip-box">Signed area: regions below x-axis contribute negative area to ∫ₐᵇ f(x)dx. For total area, integrate |f(x)| or split at x-intercepts.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch5"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">5.6 ★</div><div class="m-meta"><div class="m-title">5.6 — Fundamental Theorem of Calculus</div><div class="m-sub">FTC Part 1: d/dx∫f(t)dt=f(x) · FTC Part 2: ∫f(x)dx=F(b)−F(a)</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Apply FTC Part 1 with Chain Rule for non-x upper limit</li><li>Use FTC Part 2 to evaluate definite integrals exactly</li><li>Explain the connection between the two parts</li></ul><div class="why-box">FTC is the most important theorem in calculus. It connects differentiation and integration — two seemingly different operations.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting Chain Rule factor when upper limit is g(x) not just x</li><li>Not evaluating F at both limits and subtracting</li><li>Confusing which part of FTC to apply</li></ul><div class="tip-box">Part 1: differentiate under the integral sign. Part 2: find any antiderivative F, compute F(b)−F(a).</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch5"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">5.7–5.8</div><div class="m-meta"><div class="m-title">5.7–5.8 — Motion &amp; Average Value</div><div class="m-sub">Displacement vs distance · average value theorem · mean value for integrals</div></div><div class="m-tooltip">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Displacement = ∫v(t)dt (signed); Distance = ∫|v(t)|dt (always positive)</li><li>Average value: f_avg = (1/(b−a))·∫ₐᵇ f(x)dx</li><li>Mean Value Theorem for Integrals: ∃c with f(c) = f_avg</li><li>Split integral at zeros of v(t) to compute total distance</li></ul><div class="why-box">Displacement vs distance is a classic HW exam question. Average value connects integration to statistics and physics applications.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Computing displacement when distance is asked — must use |v(t)|</li><li>Forgetting the 1/(b−a) factor in average value formula</li><li>Not splitting the integral when v(t) changes sign</li></ul><div class="tip-box">Distance: find where v(t)=0, split integral at those points, take absolute value of each piece, add. Never just integrate v(t) directly for distance.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch7"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">7.2</div><div class="m-meta"><div class="m-title">7.2 — Integration by Parts</div><div class="m-sub">∫u dv=uv−∫v du · LIATE rule · tabular method</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Apply integration by parts once and twice</li><li>Use LIATE: Logs, Inverse trig, Algebraic, Trig, Exponential</li><li>Apply tabular method for ∫x²e^x dx type problems</li><li>Handle cyclic integrals (original integral reappears)</li></ul><div class="why-box">Integration by parts is the integration counterpart of the product rule.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Choosing u and dv backwards — use LIATE</li><li>Forgetting the minus sign before ∫v du</li><li>Not recognizing cyclic case — let recurring integral = I, solve algebraically</li></ul><div class="tip-box">LIATE: whichever appears first in the list is u. For cyclic: let I = the full integral, isolate it algebraically.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch7"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">7.3</div><div class="m-meta"><div class="m-title">7.3 — Integrating Trig Functions</div><div class="m-sub">sin^m·cos^n · tan^m·sec^n · half-angle identities</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>∫sin²x dx using sin²x=(1−cos2x)/2</li><li>∫sin³x dx by splitting one sinx and using cos²x=1−sin²x</li><li>∫tan^m·sec^n dx — identify correct u</li><li>∫sin(mx)cos(nx) dx using product-to-sum identities</li></ul><div class="why-box">Trig integrals are the most identity-heavy section. Mastery here makes trig substitution in 7.4 much easier.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Wrong half-angle: sin²x=(1−cos2x)/2, cos²x=(1+cos2x)/2 — don't mix these up</li><li>Not saving the right factor for du</li><li>Forgetting ∫sec x dx = ln|sec x + tan x| + C</li></ul><div class="tip-box">Decision: odd sin/cos → save one, use Pythagorean. Even → half-angle. tan/sec → save sec²x for u=tanx, or secx·tanx for u=secx.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch7"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">7.4</div><div class="m-meta"><div class="m-title">7.4 — Trig Substitution</div><div class="m-sub">√(a²−x²) · √(a²+x²) · √(x²−a²) · reference triangle</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>√(a²−x²) → x=a sinθ</li><li>√(a²+x²) → x=a tanθ</li><li>√(x²−a²) → x=a secθ</li><li>Complete substitution including dx, convert back using reference triangle</li></ul><div class="why-box">Handles integrals with square roots that no other technique can.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Using the wrong substitution for the radical form</li><li>Forgetting to substitute dx in terms of dθ</li><li>Not drawing the reference triangle for back-substitution</li></ul><div class="tip-box">Draw the reference triangle immediately. Label all three sides using the substitution. Use it to convert all trig back to x.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch7"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">7.5</div><div class="m-meta"><div class="m-title">7.5 — Partial Fractions</div><div class="m-sub">Distinct linear · repeated linear · irreducible quadratic factors</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Factor denominator completely first</li><li>A/(x−a) + B/(x−b) for distinct linear factors</li><li>A/(x−a) + B/(x−a)² for repeated linear</li><li>(Ax+B)/(x²+bx+c) for irreducible quadratic</li><li>Solve for constants by substituting roots</li></ul><div class="why-box">Partial fractions converts complex rational functions into ln or arctan integrals. Used heavily in differential equations.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Using A/(x²+1) instead of (Ax+B)/(x²+1) for quadratic factors</li><li>Not doing polynomial long division when degree of numerator ≥ denominator</li><li>Arithmetic errors solving for A, B, C</li></ul><div class="tip-box">Always check first: is numerator degree less than denominator degree? If not — long division first, then partial fractions on the remainder.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch7"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">7.8</div><div class="m-meta"><div class="m-title">7.8 — Improper Integrals</div><div class="m-sub">Infinite limits · discontinuous integrands · comparison · convergence</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Replace ∞ with limit variable t: ∫₁^∞ = lim(t→∞) ∫₁^t</li><li>Split at discontinuity inside the interval</li><li>Determine convergence from the limit result</li><li>Comparison test: if 0≤f≤g and ∫g converges, so does ∫f</li></ul><div class="why-box">Improper integrals connect directly to series convergence in Ch.9 — the integral test uses the same logic.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Evaluating at ∞ directly instead of taking a limit</li><li>Missing a discontinuity inside the interval</li><li>Confusing convergence with the value being 0</li></ul><div class="tip-box">Protocol: find the problem (∞ or discontinuity). Replace with limit t. Evaluate. Take limit. Finite → converges. ∞ or DNE → diverges.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch8"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">8.1</div><div class="m-meta"><div class="m-title">8.1 — Modeling with Differential Equations</div><div class="m-sub">Order · linearity · general vs particular solution · initial conditions</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Classify a DE by order and linearity</li><li>Verify a proposed solution by substituting back into the DE</li><li>Distinguish general solution (with C) from particular solution (C determined)</li><li>Set up exponential growth/decay: dy/dt = ky</li></ul><div class="why-box">DE modeling is directly relevant to pre-med: exponential decay models drug concentration, radioactive decay, population growth.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing order (highest derivative) with degree (power of that derivative)</li><li>Forgetting to apply initial condition to find particular solution</li><li>Setting up dy/dt = ky with wrong sign for decay (should be k&lt;0 or −k)</li></ul><div class="tip-box">To verify a solution: differentiate the proposed y, substitute y and y' into the DE, and confirm both sides are equal.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch8"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">8.2</div><div class="m-meta"><div class="m-title">8.2 — Separation of Variables</div><div class="m-sub">Separating dy/dx · integrating both sides · applying initial condition</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Identify separable DEs</li><li>Separate and integrate both sides with correct form</li><li>Apply initial condition to find particular solution</li></ul><div class="why-box">Primary technique for first-order DEs. Exponential growth/decay models are directly relevant to pre-med path.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Separating incorrectly — both sides must be fully separated before integrating</li><li>Forgetting +C — one C overall after combining both sides</li><li>Not solving for y when explicit form is requested</li></ul><div class="tip-box">Get all y terms and dy on one side, all x terms and dx on the other. Integrate both sides, then solve for y.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch8"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">8.3</div><div class="m-meta"><div class="m-title">8.3 — Slope Fields &amp; Euler's Method</div><div class="m-sub">Slope field sketching · Euler approximation · step size</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Evaluate dy/dx at given (x,y) points and draw slope segments</li><li>Identify solution curves from a slope field</li><li>Euler's Method: y_{n+1} = y_n + h·f(x_n, y_n)</li><li>Perform 3–5 Euler steps by hand</li></ul><div class="why-box">Slope fields appear as visual interpretation problems on HW exams. Euler's Method is a direct calculation topic.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Plugging in x only — dy/dx depends on BOTH x and y</li><li>Using wrong step direction</li><li>Rounding too early in Euler's Method</li></ul><div class="tip-box">Euler formula: new y = old y + (step size) × (slope at current point). Keep full decimal precision until the last step.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch8"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">8.4</div><div class="m-meta"><div class="m-title">8.4 — First-Order Linear DEs</div><div class="m-sub">Standard form · integrating factor · general solution · applications</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Rewrite in standard form: dy/dx + P(x)y = Q(x)</li><li>Compute integrating factor: μ(x) = e^(∫P(x)dx)</li><li>Multiply through by μ, recognize left side as d/dx[μy]</li><li>Integrate both sides and solve for y</li></ul><div class="why-box">First-order linear DEs model mixing problems, circuits, and pharmacokinetics — all directly relevant to pre-med and neuroscience.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Not putting DE in standard form before computing integrating factor</li><li>Forgetting to multiply BOTH sides by μ(x)</li><li>Not recognizing d/dx[μy] = μy' + μ'y on the left side after multiplication</li></ul><div class="tip-box">After multiplying by μ: the left side is ALWAYS d/dx[μ(x)·y]. If it doesn't look like that, check your integrating factor.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch9"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">9.1–9.2</div><div class="m-meta"><div class="m-title">9.1–9.2 — Sequences</div><div class="m-sub">Sequence limits · monotone · bounded · squeeze theorem for sequences</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Compute lim(n→∞) aₙ — treat n as continuous variable and apply limit techniques</li><li>Classify sequence as increasing/decreasing (monotone)</li><li>Apply Bounded Monotone Theorem: bounded + monotone → converges</li><li>Use Squeeze Theorem: if aₙ ≤ bₙ ≤ cₙ and aₙ,cₙ → L then bₙ → L</li></ul><div class="why-box">Sequence convergence is the foundation of series convergence in 9.3. A series converges only if its terms form a convergent sequence to 0.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing sequence {aₙ} with series Σaₙ — completely different objects</li><li>Claiming convergence from aₙ→0 alone — necessary but not sufficient for series</li><li>Not checking both bounded AND monotone for the theorem</li></ul><div class="tip-box">For lim(n→∞) aₙ: treat n as x, apply L'Hôpital if needed, use dominant growth rates (ln n ≪ n^p ≪ r^n ≪ n!).</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch9"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">9.3–9.5</div><div class="m-meta"><div class="m-title">9.3–9.5 — Series Convergence Tests</div><div class="m-sub">Geometric · divergence test · integral test · p-series · comparison · ratio · root</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Recognize geometric series: sum = a/(1−r) when |r|&lt;1</li><li>Apply divergence test: if lim a_n ≠ 0, series diverges</li><li>Choose the appropriate test based on series form</li><li>Apply each test correctly and state the conclusion</li></ul><div class="why-box">Convergence tests are one of the most tested topics in Calc 2. Recognizing which test to use is the key skill.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Concluding convergence from divergence test — it only proves divergence</li><li>Using ratio test when limit=1 — it is inconclusive</li><li>Applying comparison without verifying the inequality direction</li></ul><div class="tip-box">Ratio test: best for factorials and exponentials. Integral test: when f(n) is easy to integrate. Comparison: when similar to p-series.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch9"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">9.6</div><div class="m-meta"><div class="m-title">9.6 — Alternating Series &amp; Absolute Convergence</div><div class="m-sub">Alternating series test · error bound · absolute vs conditional convergence</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>AST: alternating series converges if |aₙ| decreasing and |aₙ|→0</li><li>Error bound: |error| ≤ |first omitted term|</li><li>Distinguish absolute convergence (Σ|aₙ| converges) from conditional (Σaₙ converges but Σ|aₙ| diverges)</li><li>Know that absolute convergence implies convergence</li></ul><div class="why-box">Alternating series test is the easiest convergence test to apply — and error bound makes it practically useful for approximations.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Applying AST without verifying BOTH conditions (decreasing AND →0)</li><li>Confusing conditional convergence with divergence — conditionally convergent series DO converge</li><li>Using wrong term for error bound — must use first OMITTED term, not last included</li></ul><div class="tip-box">AST error bound: if you sum the first N terms, the error ≤ |a_{N+1}|. This gives a concrete precision guarantee.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch9"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">9.7</div><div class="m-meta"><div class="m-title">9.7 — Taylor &amp; Maclaurin Series</div><div class="m-sub">Taylor polynomial · Maclaurin series · common series · radius of convergence</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Write Maclaurin series for e^x, sin x, cos x, 1/(1−x) from memory</li><li>Build Taylor series at x=a using f(a), f'(a), f''(a)...</li><li>Substitute into known series: e^(x²) from e^x series</li><li>Find radius of convergence using ratio test</li></ul><div class="why-box">Taylor series are the culmination of Ch.9 and one of the most tested topics in Calc 2 at HW.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting n! in denominator of Taylor coefficients</li><li>Centering at x=0 when problem asks for center x=a</li><li>Not verifying radius of convergence</li></ul><div class="tip-box">Memorize 4: e^x=Σx^n/n!, sinx=Σ(−1)^n·x^(2n+1)/(2n+1)!, cosx=Σ(−1)^n·x^(2n)/(2n)!, 1/(1−x)=Σx^n. Everything else is built from these.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch9"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">9.8–9.10</div><div class="m-meta"><div class="m-title">9.8–9.10 — Power Series &amp; Radius of Convergence</div><div class="m-sub">Power series · interval of convergence · differentiation/integration of series</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Use ratio test to find radius of convergence R</li><li>Check endpoints separately — ratio test is inconclusive at endpoints</li><li>Differentiate/integrate power series term by term within radius of convergence</li><li>Find power series for new functions by substituting into known series</li></ul><div class="why-box">Power series representation is essential for computing limits, integrals, and approximations that cannot be done otherwise. Heavily tested on HW Calc 2 exams.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting to check BOTH endpoints individually for inclusion in interval</li><li>Using wrong center — power series Σaₙ(x−c)^n is centered at c, not 0</li><li>Differentiating/integrating outside the radius of convergence</li></ul><div class="tip-box">After finding R: check x = c+R and x = c−R separately using other tests (AST, p-series, etc.). The interval of convergence may or may not include endpoints.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch10"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">10.1</div><div class="m-meta"><div class="m-title">10.1 — Parametric Equations</div><div class="m-sub">dy/dx via parametric · d²y/dx² · arc length · tangent lines</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>dy/dx = (dy/dt)/(dx/dt) — never differentiate y directly w.r.t. x</li><li>d²y/dx² = (d/dt[dy/dx])/(dx/dt)</li><li>Tangent line to parametric curve at given t</li><li>Arc length: L = ∫√((dx/dt)² + (dy/dt)²) dt</li></ul><div class="why-box">Parametric calculus is a different mode — both x and y depend on t. Component-wise thinking is essential.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Computing d²y/dx² as (d²y/dt²)/(d²x/dt²) — this is WRONG</li><li>Forgetting to divide by dx/dt for dy/dx</li><li>Wrong limits of integration for arc length</li></ul><div class="tip-box">Second derivative: differentiate dy/dx with respect to t first, THEN divide by dx/dt. Never differentiate numerator and denominator separately.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch10"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">10.2</div><div class="m-meta"><div class="m-title">10.2 — Polar Coordinates</div><div class="m-sub">r=f(θ) · converting between polar and Cartesian · common curves</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Convert: x=r·cosθ, y=r·sinθ, r²=x²+y², tanθ=y/x</li><li>Sketch: r=a (circle), r=a·cosθ (circle through origin), r=1+cosθ (cardioid)</li><li>Find intersections — check r=0 separately at the pole</li><li>Identify symmetry about polar axis, θ=π/2, or pole</li></ul><div class="why-box">Polar coordinates are required for area and arc length in 10.3. Many HW exam problems mix polar with integration.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Missing intersections at the pole (r=0 at different θ values)</li><li>Confusing r=2cosθ (circle) with r=2+cosθ (limaçon)</li><li>Using degrees instead of radians for θ</li></ul><div class="tip-box">Always check r=0 separately for intersections — set r=0 in each equation independently. The pole is a common hidden intersection point.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch10"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">10.3</div><div class="m-meta"><div class="m-title">10.3 — Polar Calculus: Area &amp; Arc Length</div><div class="m-sub">A = ½∫r²dθ · area between curves · arc length in polar</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Area: A = ½∫r² dθ over correct θ interval</li><li>Area between two curves: ½∫(r_outer² − r_inner²) dθ</li><li>Find correct θ limits by sketching the region first</li><li>Arc length: L = ∫√(r² + (dr/dθ)²) dθ</li></ul><div class="why-box">Polar area is one of the most common HW Calc 2 exam topics. The ½ in the formula is the most frequently forgotten detail.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting the ½ in A = ½∫r² dθ</li><li>Wrong θ limits — always sketch first to identify the region</li><li>Subtracting areas in wrong order</li></ul><div class="tip-box">4 steps: sketch → find intersections for θ limits → identify outer r → set up ½∫(r_out² − r_in²)dθ.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch12"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">12.1</div><div class="m-meta"><div class="m-title">12.1 — Vector-Valued Functions</div><div class="m-sub">r(t) = x(t)i + y(t)j + z(t)k · domain · limits · continuity</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Evaluate r(t) at specific t values</li><li>Find domain by intersecting domains of all components</li><li>Compute lim r(t) component by component</li><li>Sketch simple plane curves defined by r(t)</li></ul><div class="why-box">Vector-valued functions extend single-variable calculus to curves in space. Component-wise operation is the key principle throughout Ch.12.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting to intersect domains of ALL components</li><li>Treating r(t) as a scalar — it is always a vector</li><li>Confusing the curve traced by r(t) with a function graph</li></ul><div class="tip-box">Every operation on r(t) is done component by component. Split into x, y, z. Operate. Recombine.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch12"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">12.2</div><div class="m-meta"><div class="m-title">12.2 — Calculus of Vector Functions</div><div class="m-sub">r'(t) · unit tangent vector · smooth curve · definite integral</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Differentiate r(t) component by component</li><li>Unit tangent vector: T(t) = r'(t)/|r'(t)|</li><li>Determine where curve is smooth (r'(t) ≠ 0)</li><li>Integrate r(t) component by component with vector constant C</li></ul><div class="why-box">r'(t) gives velocity vector in motion problems (12.6). Unit tangent is needed for curvature.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Integration constant C is a VECTOR, not a scalar</li><li>|r'(t)| = √(x'²+y'²+z'²) — don't add components before squaring</li><li>Not checking r'(t) ≠ 0 before claiming smoothness</li></ul><div class="tip-box">Differentiation and integration: split into components, operate on each, recombine. Integration constant: C = C₁i + C₂j + C₃k.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

    <div class="m-card" data-ch="ch12"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">12.6</div><div class="m-meta"><div class="m-title">12.6 — Motion Along a Curve</div><div class="m-sub">Position · velocity · acceleration · speed · projectile motion</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>r(t) = position, v(t) = r'(t), a(t) = v'(t)</li><li>Speed = |v(t)| = √(x'²+y'²+z'²)</li><li>Find position from acceleration by integrating twice with ICs</li><li>Projectile motion: a(t) = −gj, find max height and range</li></ul><div class="why-box">Motion problems combine all vector calculus from 12.1–12.2 with initial value problems from Ch.8.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing speed (scalar |v|) with velocity (vector v)</li><li>Forgetting to apply initial conditions after each integration</li><li>Using g=9.8 vs g=32 — check units (m/s² vs ft/s²)</li></ul><div class="tip-box">Position → differentiate → velocity → differentiate → acceleration. Reverse direction: acceleration → integrate+IC → velocity → integrate+IC → position.</div></div></div><div class="phase5-wrap"><label class="phase5-label"><input type="checkbox" class="phase5-cb" onchange="updateMasteryProg(this)"><span>Phase 5 Complete — ready for next section</span></label></div></div></div>

  </div>

  </div>
`;
