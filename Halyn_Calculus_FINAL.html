<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halyn — Calculus I & II Study Guide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#5a5a56;--text3:#8a8a84;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --teal-bg:#E1F5EE;--teal:#0F6E56;--teal-mid:#1D9E75;
  --blue-bg:#E6F1FB;--blue:#185FA5;--blue-mid:#378ADD;
  --amber-bg:#FAEEDA;--amber:#854F0B;--amber-mid:#BA7517;
  --gray-bg:#F1EFE8;--gray:#5F5E5A;
  --red-bg:#FCEBEB;--red:#A32D2D;
  --purple-bg:#EEEDFE;--purple:#3C3489;
  --green-bg:#EAF3DE;--green:#3B6D11;
  --radius:10px;--radius-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg2);color:var(--text);font-size:14px;line-height:1.6;}

/* HEADER */
.site-header{background:var(--bg);border-bottom:1px solid var(--border);padding:18px 32px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.header-left h1{font-size:17px;font-weight:600;}
.header-left p{font-size:12px;color:var(--text3);margin-top:2px;}
.prog-summary{display:flex;gap:16px;align-items:center;}
.prog-stat{text-align:center;}
.prog-stat .num{font-size:20px;font-weight:600;color:var(--teal);}
.prog-stat .lbl{font-size:11px;color:var(--text3);}
.prog-div{width:1px;height:32px;background:var(--border);}

/* TABS */
.tab-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:0;overflow-x:auto;}
.tab-btn{padding:11px 18px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}

/* LAYOUT */
.main{max-width:1120px;margin:0 auto;padding:26px 22px;}
.tab-content{display:none !important;}
.tab-content.active{display:block !important;}

/* FILTER */
.filter-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:12px;color:var(--text3);margin-right:4px;}
.filter-btn{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all 0.15s;}
.filter-btn.active{background:var(--teal-mid);color:#fff;border-color:var(--teal-mid);}

/* BADGES */
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.b-essential{background:var(--teal-bg);color:var(--teal);}
.b-beyond{background:var(--gray-bg);color:var(--gray);}
.b-master{background:var(--teal-bg);color:var(--teal);}
.b-familiarity{background:var(--blue-bg);color:var(--blue);}
.b-preview{background:var(--gray-bg);color:var(--gray);}
.b-warning{background:var(--red-bg);color:var(--red);}
.b-critical{background:#A32D2D;color:#fff;}

/* CHAPTER CARDS — Curriculum Map */
.ch-grid{display:flex;flex-direction:column;gap:10px;}
.ch-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.ch-card-header{padding:12px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none;}
.ch-icon{width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.ch-meta{flex:1;}
.ch-title{font-size:13px;font-weight:600;color:var(--text);}
.ch-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.ch-badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.ch-toggle{font-size:16px;color:var(--text3);margin-left:auto;flex-shrink:0;transition:transform 0.2s;}
.ch-card.open .ch-toggle{transform:rotate(180deg);}
.ch-prog{display:flex;align-items:center;gap:6px;margin-left:8px;}
.ch-bar{width:70px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.ch-fill{height:100%;background:var(--teal-mid);border-radius:3px;transition:width 0.3s;}
.ch-pct{font-size:11px;color:var(--text3);width:26px;text-align:right;}

/* CARD BODY */
.ch-body{display:none;border-top:1px solid var(--border);}
.ch-card.open .ch-body{display:block;}
.section-rows{width:100%;border-collapse:collapse;}
.section-rows thead tr{background:var(--bg3);}
.section-rows th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--text3);border-bottom:1px solid var(--border2);}
.section-rows td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top;line-height:1.5;}
.section-rows tr:last-child td{border-bottom:none;}
.section-rows tr:hover td{background:var(--bg2);}
.section-rows a{color:var(--blue);text-decoration:none;font-size:11px;}
.section-rows a:hover{text-decoration:underline;}
.cb-wrap{display:flex;align-items:center;gap:6px;}
.cb-wrap input{accent-color:var(--teal-mid);width:13px;height:13px;cursor:pointer;}
.cb-wrap span{font-size:12px;}
.done-text{text-decoration:line-through;color:var(--text3);}

/* MASTERY CARDS */
.mastery-grid{display:flex;flex-direction:column;gap:10px;}
.m-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.m-header{padding:12px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none;}
.m-icon{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.m-meta{flex:1;}
.m-title{font-size:13px;font-weight:600;}
.m-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.m-toggle{font-size:16px;color:var(--text3);margin-left:auto;transition:transform 0.2s;}
.m-card.open .m-toggle{transform:rotate(180deg);}
.m-body{display:none;border-top:1px solid var(--border);}
.m-card.open .m-body{display:block;}
.m-sections{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.m-sec{padding:14px 16px;border-right:1px solid var(--border);}
.m-sec:last-child{border-right:none;}
.m-sec:nth-child(3),.m-sec:nth-child(4){border-top:1px solid var(--border);}
.sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:7px;}
.sec-content{font-size:12px;color:var(--text);line-height:1.65;}
.must-list{list-style:none;}
.must-list li{display:flex;gap:6px;padding:3px 0;font-size:12px;border-bottom:1px solid var(--border);line-height:1.5;}
.must-list li:last-child{border-bottom:none;}
.must-list li::before{content:"✓";color:var(--teal);font-weight:700;flex-shrink:0;}
.mistake-list{list-style:none;}
.mistake-list li{display:flex;gap:6px;padding:3px 0;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);line-height:1.5;}
.mistake-list li:last-child{border-bottom:none;}
.mistake-list li::before{content:"!";background:var(--red-bg);color:var(--red);border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px;}
.tip-box{background:var(--blue-bg);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--blue);margin-top:6px;line-height:1.6;}
.why-box{background:var(--amber-bg);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--amber);margin-top:6px;line-height:1.6;}

/* PRE-CAL BRIDGE */
.bridge-intro{background:var(--red-bg);border:1px solid #F09595;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;font-size:13px;color:var(--red);line-height:1.7;}
.bridge-intro strong{font-weight:600;}
.bridge-grid{display:flex;flex-direction:column;gap:12px;}
.bridge-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.bridge-header{padding:12px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none;}
.bridge-icon{width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.bridge-meta{flex:1;}
.bridge-title{font-size:13px;font-weight:600;}
.bridge-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.bridge-toggle{font-size:16px;color:var(--text3);margin-left:auto;transition:transform 0.2s;}
.bridge-card.open .bridge-toggle{transform:rotate(180deg);}
.bridge-body{display:none;border-top:1px solid var(--border);}
.bridge-card.open .bridge-body{display:block;}
.bridge-sections{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;}
.bridge-sec{padding:14px 16px;border-right:1px solid var(--border);}
.bridge-sec:last-child{border-right:none;}
.impact-list{list-style:none;}
.impact-list li{display:flex;gap:6px;padding:3px 0;font-size:12px;border-bottom:1px solid var(--border);line-height:1.5;}
.impact-list li:last-child{border-bottom:none;}
.impact-list li::before{content:"→";color:var(--red);font-weight:700;flex-shrink:0;}
.selfcheck{background:var(--purple-bg);border-radius:var(--radius-sm);padding:8px 12px;margin-top:8px;}
.selfcheck-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--purple);margin-bottom:4px;}
.selfcheck p{font-size:12px;color:var(--purple);font-style:italic;line-height:1.5;}
.check-list{list-style:none;margin-top:8px;}
.check-list li{display:flex;gap:7px;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border);align-items:flex-start;}
.check-list li:last-child{border-bottom:none;}
.check-list input{accent-color:var(--teal-mid);width:13px;height:13px;cursor:pointer;flex-shrink:0;margin-top:2px;}

/* STUDY METHOD */
.method-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.method-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.method-card h3{font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.method-table{width:100%;border-collapse:collapse;}
.method-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border2);}
.method-table td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top;line-height:1.55;}
.method-table tr:last-child td{border-bottom:none;}
.full-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;}
.full-card h3{font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.principle-box{background:var(--amber-bg);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--amber);line-height:1.7;margin-bottom:14px;}
.principle-box strong{font-weight:600;}
.resource-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
.resource-row:last-child{border-bottom:none;}
.res-num{width:22px;height:22px;border-radius:50%;background:var(--teal-mid);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.res-content{flex:1;}
.res-title{font-size:13px;font-weight:600;color:var(--text);}
.res-desc{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.5;}
.stuck-row{display:grid;grid-template-columns:120px 1fr 1fr;gap:0;border-bottom:1px solid var(--border);padding:8px 0;}
.stuck-row:last-child{border-bottom:none;}
.stuck-time{font-size:12px;font-weight:600;color:var(--red);}
.stuck-action{font-size:12px;padding:0 12px;}
.stuck-why{font-size:12px;color:var(--text2);}
.warning-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.warning-row:last-child{border-bottom:none;}
.warning-sign{font-size:12px;color:var(--red);}
.warning-action{font-size:12px;color:var(--text2);}
.tanglewood-box{background:var(--blue-bg);border-radius:var(--radius-sm);padding:12px 16px;font-size:12px;color:var(--blue);line-height:1.65;margin-bottom:14px;}

/* DAILY LOG */
.log-header{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.log-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
.log-stat .num{font-size:22px;font-weight:600;color:var(--teal);}
.log-stat .lbl{font-size:11px;color:var(--text3);margin-top:2px;}
.log-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;}
.log-form h3{font-size:13px;font-weight:600;margin-bottom:12px;}
.log-fields{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:10px;align-items:end;}
.log-field label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;}
.log-field input,.log-field select{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);color:var(--text);}
.log-field select{cursor:pointer;}
.add-btn{padding:8px 16px;background:var(--teal-mid);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
.add-btn:hover{background:var(--teal);}
.log-chart{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;}
.log-chart h3{font-size:13px;font-weight:600;margin-bottom:14px;}
.chart-area{height:160px;display:flex;align-items:flex-end;gap:6px;padding:0 4px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.chart-bar{width:100%;background:var(--teal-mid);border-radius:3px 3px 0 0;min-height:2px;transition:height 0.3s;}
.chart-day{font-size:10px;color:var(--text3);}
.chart-val{font-size:10px;color:var(--text2);}
.log-table-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.log-table{width:100%;border-collapse:collapse;}
.log-table th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border2);}
.log-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;}
.log-table tr:last-child td{border-bottom:none;}
.diff-easy{background:var(--teal-bg);color:var(--teal);padding:2px 8px;border-radius:20px;font-size:11px;}
.diff-ok{background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:20px;font-size:11px;}
.diff-hard{background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:20px;font-size:11px;}
.del-btn{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;padding:2px 6px;border-radius:4px;}
.del-btn:hover{background:var(--red-bg);color:var(--red);}
.empty-log{text-align:center;padding:32px;color:var(--text3);font-size:13px;}

@media(max-width:700px){
  .site-header{padding:12px 14px;}
  .main{padding:14px 10px;}
  .tab-bar{padding:0 10px;}
  .m-sections,.bridge-sections{grid-template-columns:1fr;}
  .m-sec:nth-child(2){border-top:1px solid var(--border);border-right:none;}
  .m-sec:nth-child(3){border-right:none;}
  .bridge-sec:nth-child(2),.bridge-sec:nth-child(3){border-top:1px solid var(--border);border-right:none;}
  .method-grid{grid-template-columns:1fr;}
  .log-fields{grid-template-columns:1fr 1fr;}
  .log-header{grid-template-columns:1fr 1fr;}
  .prog-summary{display:none;}
}

/* Foundation Check */
.fc-intro{background:var(--red-bg);border:1px solid #F09595;border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;font-size:13px;color:var(--red);line-height:1.7;}
.fc-intro-title{font-size:14px;font-weight:600;margin-bottom:8px;}
.fc-test-links{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap;}
.fc-test-btn{display:inline-block;padding:8px 16px;background:var(--teal-mid);color:#fff;border-radius:var(--radius-sm);text-decoration:none;font-size:13px;font-weight:500;}
.fc-test-btn-sec{background:var(--blue-mid);}
.fc-section-header{font-size:13px;font-weight:600;color:var(--text);padding:10px 0 8px;border-bottom:2px solid var(--teal-mid);margin-bottom:14px;display:inline-block;}
.fc-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.fc-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.fc-card-header{padding:12px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none;}
.fc-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.fc-meta{flex:1;}
.fc-title{font-size:13px;font-weight:600;}
.fc-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.fc-badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.fc-toggle{font-size:16px;color:var(--text3);margin-left:auto;transition:transform 0.2s;}
.fc-card.open .fc-toggle{transform:rotate(180deg);}
.fc-body{display:none;border-top:1px solid var(--border);}
.fc-card.open .fc-body{display:block;}
.fc-sections{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.fc-sec{padding:14px 16px;border-right:1px solid var(--border);}
.fc-sec:last-child{border-right:none;}
.fc-resources{display:flex;flex-direction:column;gap:4px;margin-top:10px;}
.fc-resources a{font-size:12px;color:var(--blue);text-decoration:none;}
.fc-resources a:hover{text-decoration:underline;}
.fc-selfcheck{background:var(--purple-bg);border-top:1px solid var(--border);padding:14px 16px;}
.fc-selfcheck-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--purple);margin-bottom:8px;}
.fc-check-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text);padding:5px 0;border-bottom:1px solid rgba(60,52,137,0.12);line-height:1.5;cursor:pointer;}
.fc-check-item:last-of-type{border-bottom:none;}
.fc-check-item input{accent-color:var(--purple);margin-top:2px;flex-shrink:0;}
.fc-complete-row{margin-top:8px;padding-top:8px;border-top:1px solid rgba(60,52,137,0.2);}
.fc-complete-label{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--purple);cursor:pointer;}
.fc-complete-label input{accent-color:var(--teal-mid);}
.b-critical{background:#A32D2D;color:#fff;}
.impact-list{list-style:none;}
.impact-list li{display:flex;gap:6px;padding:3px 0;font-size:12px;border-bottom:1px solid var(--border);line-height:1.5;}
.impact-list li:last-child{border-bottom:none;}
.impact-list li::before{content:"→";color:var(--red);font-weight:700;flex-shrink:0;}
.fc-progress-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-top:20px;}
.fc-progress-title{font-size:13px;font-weight:600;margin-bottom:10px;}
.fc-progress-row{display:flex;align-items:center;gap:12px;}
.fc-prog-bar-wrap{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.fc-prog-bar{height:100%;background:var(--teal-mid);border-radius:4px;transition:width 0.3s;width:0%;}
.fc-prog-label{font-size:13px;color:var(--text2);white-space:nowrap;}
/* Phase 5 */
.phase5-wrap{padding:10px 16px;background:var(--teal-bg);border-top:1px solid var(--border);}
.phase5-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--teal);cursor:pointer;font-weight:500;}
.phase5-label input{accent-color:var(--teal-mid);}
@media(max-width:700px){.fc-sections{grid-template-columns:1fr;}.fc-sec:first-child{border-bottom:1px solid var(--border);border-right:none;}}

</style>
<style>.loading{text-align:center;padding:60px;color:#8a8a84;font-size:14px;}</style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <h1>Calculus I &amp; II — Study Guide</h1>
    <p>Harvard-Westlake · Anton 10th Ed · Halyn Kim</p>

      </div>
    
    <div class="m-card" data-ch="ch3"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">3.2</div><div class="m-meta"><div class="m-title">3.2 — Derivatives of Log Functions</div><div class="m-sub">d/dx[ln x]=1/x · d/dx[ln|f(x)|]=f'(x)/f(x) · logarithmic differentiation</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>d/dx[ln(x²+1)] = 2x/(x²+1) using Chain Rule</li><li>d/dx[ln|sec x|] = sec x · tan x / sec x = tan x</li><li>Use logarithmic differentiation for y = x^x or products of many terms</li><li>Differentiate log base a: d/dx[log_a(x)] = 1/(x·ln a)</li></ul><div class="why-box">Log derivatives appear in every integration technique in Ch.7 — ∫(1/x)dx = ln|x|+C is the foundation.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Writing d/dx[ln(f(x))] = 1/f(x) — must multiply by f'(x)</li><li>Forgetting absolute value: d/dx[ln|x|] not d/dx[ln(x)]</li><li>Using log base 10 rules instead of natural log rules</li></ul><div class="tip-box">Every log derivative is a Chain Rule application: outer = ln, inner = f(x). Result is always f'(x)/f(x).</div></div></div></div></div>

    <div class="m-card" data-ch="ch3"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">3.3</div><div class="m-meta"><div class="m-title">3.3 — Derivatives of Exp &amp; Inverse Trig</div><div class="m-sub">d/dx[e^x]=e^x · d/dx[a^x]=a^x·ln a · arcsin/arctan/arcsec derivatives</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>d/dx[e^(3x²)] = e^(3x²)·6x</li><li>d/dx[2^x] = 2^x·ln 2</li><li>d/dx[arcsin(x)] = 1/√(1−x²)</li><li>d/dx[arctan(x)] = 1/(1+x²)</li><li>d/dx[arctan(f(x))] = f'(x)/(1+f(x)²) via Chain Rule</li></ul><div class="why-box">Inverse trig derivatives reappear directly in Ch.7 trig substitution results and partial fractions.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting Chain Rule multiplier on e^(f(x))</li><li>Confusing arcsin and arccos derivatives — arccos has a negative sign</li><li>Using degree mode instead of radian mode conceptually</li></ul><div class="tip-box">Memorize the 3 inverse trig derivatives as a set. arcsin: 1/√(1−x²), arctan: 1/(1+x²), arcsec: 1/(|x|√(x²−1)).</div></div></div></div></div>

    <div class="m-card" data-ch="ch4"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E1F5EE;color:#0F6E56;">4.8</div><div class="m-meta"><div class="m-title">4.8 — Mean Value Theorem</div><div class="m-sub">Rolle's Theorem · MVT statement · consequences · applications</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>State MVT: if f continuous on [a,b] and differentiable on (a,b), then ∃c such that f'(c)=(f(b)−f(a))/(b−a)</li><li>Verify the two hypotheses before applying MVT</li><li>Find the value c guaranteed by MVT for a given function</li><li>Apply Rolle's Theorem as a special case (f(a)=f(b))</li></ul><div class="why-box">MVT is used to justify increase/decrease tests in 4.1 and to prove FTC in 5.6. HW exams test it directly.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Applying MVT without verifying continuity and differentiability hypotheses</li><li>Confusing the slope (f(b)−f(a))/(b−a) with f'(a) or f'(b)</li><li>Forgetting that c must be in the OPEN interval (a,b)</li></ul><div class="tip-box">MVT says: average rate of change over [a,b] equals instantaneous rate at some interior point c. Draw it — one tangent line parallel to the secant.</div></div></div></div></div>

    <div class="m-card" data-ch="ch7"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">7.3</div><div class="m-meta"><div class="m-title">7.3 — Integrating Trig Functions</div><div class="m-sub">sin^m·cos^n · tan^m·sec^n · half-angle identities · reduction</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>∫sin²x dx using half-angle: sin²x=(1−cos2x)/2</li><li>∫sin³x dx by splitting one sin and using cos²x=1−sin²x</li><li>∫tan^m·sec^n dx — identify which factor to save for u=tanx or u=secx</li><li>∫sin(mx)cos(nx) dx using product-to-sum identities</li></ul><div class="why-box">Trig integrals are the most identity-heavy section. Mastery here makes trig substitution in 7.4 much easier.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Using wrong half-angle identity — sin²x=(1−cos2x)/2, cos²x=(1+cos2x)/2</li><li>Not saving the right factor for du in tan/sec integrals</li><li>Forgetting that ∫sec x dx = ln|sec x + tan x| + C (must memorize)</li></ul><div class="tip-box">Decision tree: odd power of sin/cos → save one, use Pythagorean. Even power → half-angle identity. tan/sec → save sec²x for u=tanx, or secx·tanx for u=secx.</div></div></div></div></div>

    <div class="m-card" data-ch="ch7"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">7.5</div><div class="m-meta"><div class="m-title">7.5 — Partial Fractions</div><div class="m-sub">Distinct linear · repeated linear · irreducible quadratic factors</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Factor denominator completely before setting up partial fractions</li><li>Set up correct form: A/(x−a) + B/(x−b) for distinct linear factors</li><li>A/(x−a) + B/(x−a)² for repeated linear factors</li><li>(Ax+B)/(x²+bx+c) for irreducible quadratic factors</li><li>Solve for constants by substituting roots or expanding</li></ul><div class="why-box">Partial fractions converts a complex rational function into simple integrals — usually ln or arctan forms. Used heavily in differential equations.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Using A/(x²+1) instead of (Ax+B)/(x²+1) for quadratic factors</li><li>Not performing polynomial long division when degree of numerator ≥ degree of denominator</li><li>Arithmetic errors when solving the system for A, B, C</li></ul><div class="tip-box">Always check: is the fraction proper? (numerator degree &lt; denominator degree). If not — long division first, then partial fractions on the remainder.</div></div></div></div></div>

    <div class="m-card" data-ch="ch7"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">7.8</div><div class="m-meta"><div class="m-title">7.8 — Improper Integrals</div><div class="m-sub">Infinite limits · discontinuous integrands · comparison test · convergence</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Replace ∞ with limit variable t: ∫₁^∞ = lim(t→∞) ∫₁^t</li><li>Handle discontinuity at endpoint: split integral at discontinuity</li><li>Determine convergence/divergence from the limit result</li><li>Apply comparison test: if 0≤f≤g and ∫g converges, so does ∫f</li></ul><div class="why-box">Improper integrals connect to series convergence in Ch.9 — integral test for series uses the same logic.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Evaluating at ∞ directly instead of taking a limit</li><li>Missing a discontinuity inside the interval — must split the integral</li><li>Confusing convergence with the value being 0</li></ul><div class="tip-box">Protocol: identify the problem (∞ limit or discontinuity). Replace with limit variable t. Evaluate. Take the limit. If finite → converges. If ∞ or DNE → diverges.</div></div></div></div></div>

    <div class="m-card" data-ch="ch8"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#E6F1FB;color:#185FA5;">8.3</div><div class="m-meta"><div class="m-title">8.3 — Slope Fields &amp; Euler's Method</div><div class="m-sub">Slope field sketching · Euler's Method approximation · step size</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Evaluate dy/dx at given (x,y) points and draw short slope segments</li><li>Identify which solution curve a slope field represents</li><li>Apply Euler's Method: y_{n+1} = y_n + h·f(x_n, y_n)</li><li>Perform 3–5 steps of Euler's Method by hand</li></ul><div class="why-box">Slope fields appear on AP exams and HW tests as visual interpretation problems. Euler's Method is testable calculation.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Plugging in x only — dy/dx depends on BOTH x and y</li><li>Using wrong step direction (h must be positive for forward)</li><li>Rounding too early in Euler's Method steps</li></ul><div class="tip-box">Euler's Method formula: new y = old y + (step size) × (slope at current point). Keep full decimal precision until the last step.</div></div></div></div></div>

    <div class="m-card" data-ch="ch9"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">9.7</div><div class="m-meta"><div class="m-title">9.7 — Taylor &amp; Maclaurin Series</div><div class="m-sub">Taylor polynomial · Maclaurin series · common series · radius of convergence</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Write Maclaurin series for e^x, sin x, cos x, 1/(1−x) from memory</li><li>Build Taylor series centered at x=a using f(a), f'(a), f''(a), ...</li><li>Substitute into known series: e^(x²) from e^x series</li><li>Find radius of convergence using ratio test</li></ul><div class="why-box">Taylor series are the culmination of Ch.9 and one of the most tested topics in Calc 2 at HW.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting the n! in the denominator of Taylor coefficients</li><li>Centering at x=0 (Maclaurin) when problem asks for center x=a</li><li>Not verifying radius of convergence before using the series</li></ul><div class="tip-box">Memorize these 4: e^x=Σx^n/n!, sin x=Σ(−1)^n·x^(2n+1)/(2n+1)!, cos x=Σ(−1)^n·x^(2n)/(2n)!, 1/(1−x)=Σx^n. Everything else is built from these.</div></div></div></div></div>

    <div class="m-card" data-ch="ch10"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">10.1</div><div class="m-meta"><div class="m-title">10.1 — Parametric Equations</div><div class="m-sub">dy/dx via parametric · d²y/dx² · arc length · slope of tangent</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Find dy/dx = (dy/dt)/(dx/dt) — never differentiate y directly w.r.t. x</li><li>Find d²y/dx² = (d/dt[dy/dx])/(dx/dt)</li><li>Find tangent line to parametric curve at given t</li><li>Arc length: L = ∫√((dx/dt)² + (dy/dt)²) dt</li></ul><div class="why-box">Parametric calculus is a completely different mode of differentiation. The key insight is that both x and y depend on t.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Computing d²y/dx² as (d²y/dt²)/(d²x/dt²) — this is WRONG</li><li>Forgetting to divide by dx/dt when finding dy/dx</li><li>Using wrong limits of integration for arc length</li></ul><div class="tip-box">For second derivative: differentiate dy/dx with respect to t first, THEN divide by dx/dt. Never differentiate numerator and denominator separately.</div></div></div></div></div>

    <div class="m-card" data-ch="ch10"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">10.2</div><div class="m-meta"><div class="m-title">10.2 — Polar Coordinates</div><div class="m-sub">r=f(θ) · converting between polar and Cartesian · common polar curves</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Convert: x=r·cosθ, y=r·sinθ, r²=x²+y², tanθ=y/x</li><li>Sketch common curves: r=a (circle), r=a·cosθ (circle through origin), r=1+cosθ (cardioid)</li><li>Find where two polar curves intersect (check r=0 separately)</li><li>Identify symmetry: about polar axis, θ=π/2, or pole</li></ul><div class="why-box">Polar coordinates are required for area and arc length in 10.3. Many HW exam problems mix polar with integration.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Missing intersection points at the pole (r=0 at different θ values)</li><li>Confusing r=2cosθ (circle) with r=2+cosθ (limaçon)</li><li>Using degrees instead of radians for θ</li></ul><div class="tip-box">Always check r=0 separately for intersections — set r=0 and solve for θ in each equation independently. The pole is a common hidden intersection.</div></div></div></div></div>

    <div class="m-card" data-ch="ch10"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">10.3</div><div class="m-meta"><div class="m-title">10.3 — Polar Calculus</div><div class="m-sub">Area in polar · arc length · tangent lines to polar curves</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Area formula: A = ½∫r² dθ over correct interval</li><li>Area between two polar curves: ½∫(r_outer² − r_inner²) dθ</li><li>Find correct θ limits by sketching the region</li><li>Arc length: L = ∫√(r² + (dr/dθ)²) dθ</li></ul><div class="why-box">Polar area is one of the most common HW Calc 2 exam topics. The ½ in the formula is frequently forgotten.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting the ½ in A = ½∫r² dθ</li><li>Using wrong θ limits — always sketch first to identify the region</li><li>Subtracting areas in wrong order (outer minus inner)</li></ul><div class="tip-box">Step 1: sketch both curves. Step 2: find intersections for limits. Step 3: identify which r is outer. Step 4: set up ½∫(r_out² − r_in²) dθ.</div></div></div></div></div>

    <div class="m-card" data-ch="ch12"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">12.1</div><div class="m-meta"><div class="m-title">12.1 — Vector-Valued Functions</div><div class="m-sub">r(t) = x(t)i + y(t)j + z(t)k · domain · limits · continuity</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Evaluate r(t) at a specific t value</li><li>Find domain of r(t) by intersecting domains of components</li><li>Compute lim r(t) component by component</li><li>Sketch simple plane curves defined by r(t)</li></ul><div class="why-box">Vector-valued functions extend all single-variable calculus to curves in space. Component-wise operation is the key principle throughout Ch.12.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting to find domain of ALL components and intersect</li><li>Treating r(t) as a scalar — it is always a vector</li><li>Confusing the curve traced by r(t) with the graph of a function</li></ul><div class="tip-box">Every operation on r(t) — limits, derivatives, integrals — is done component by component. Split into x, y, z. Operate. Recombine.</div></div></div></div></div>

    <div class="m-card" data-ch="ch12"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">12.2</div><div class="m-meta"><div class="m-title">12.2 — Calculus of Vector Functions</div><div class="m-sub">r'(t) · tangent vector · smooth curve · definite integral of r(t)</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>Differentiate r(t) component by component</li><li>Find unit tangent vector T(t) = r'(t)/|r'(t)|</li><li>Determine where a curve is smooth (r'(t) ≠ 0)</li><li>Integrate r(t) component by component with vector constant C</li></ul><div class="why-box">r'(t) gives velocity vector in motion problems (12.6). Unit tangent vector is needed for curvature.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Forgetting that the integration constant C is a vector, not a scalar</li><li>Computing |r'(t)| incorrectly — it is √(x'²+y'²+z'²)</li><li>Not checking r'(t) ≠ 0 before claiming the curve is smooth</li></ul><div class="tip-box">Differentiation: split into components, differentiate each, recombine. Integration: same process, but add a vector constant C = C₁i + C₂j + C₃k.</div></div></div></div></div>

    <div class="m-card" data-ch="ch12"><div class="m-header" onclick="toggleM(this)"><div class="m-icon" style="background:#FAEEDA;color:#854F0B;">12.6</div><div class="m-meta"><div class="m-title">12.6 — Motion Along a Curve</div><div class="m-sub">Position · velocity · acceleration · speed · projectile motion</div></div><div class="m-toggle">▾</div></div><div class="m-body"><div class="m-sections"><div class="m-sec"><div class="sec-title">Must be able to do</div><ul class="must-list"><li>r(t) = position, v(t) = r'(t) = velocity, a(t) = v'(t) = acceleration</li><li>Speed = |v(t)| = √(x'²+y'²+z'²)</li><li>Find position from acceleration by integrating twice with initial conditions</li><li>Solve projectile motion: a(t) = −gj, find max height and range</li></ul><div class="why-box">Motion problems are a direct application of all vector calculus from 12.1–12.2. HW exams combine this with initial value problems from Ch.8.</div></div><div class="m-sec"><div class="sec-title">Common mistakes</div><ul class="mistake-list"><li>Confusing speed (scalar) with velocity (vector)</li><li>Not applying initial conditions after each integration step</li><li>Using g = 9.8 vs g = 32 — check units (m/s² vs ft/s²)</li></ul><div class="tip-box">Position → differentiate → velocity → differentiate → acceleration. Reverse: acceleration → integrate + IC → velocity → integrate + IC → position.</div></div></div></div></div>

  </div>
`;
