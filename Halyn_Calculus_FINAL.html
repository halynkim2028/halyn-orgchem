  const pct=boxes.length?Math.round(checked/boxes.length*100):0;
  const fill=document.getElementById('pfill'+ch);
  const pctEl=document.getElementById('ppct'+ch);
  if(fill)fill.style.width=pct+'%';
  if(pctEl)pctEl.textContent=pct+'%';
  const row=cb.closest('tr');
  if(row){const spans=row.querySelectorAll('span');spans.forEach(s=>s.classList.toggle('done-text',cb.checked));}
  updateGlobal();saveProgress();
}
function updateGlobal(){
  const all=document.querySelectorAll('.section-rows input[type="checkbox"]');
  const done=document.querySelectorAll('.section-rows input[type="checkbox"]:checked').length;
  document.getElementById('g-total').textContent=all.length;
  document.getElementById('g-done').textContent=done;
  document.getElementById('g-pct').textContent=all.length?Math.round(done/all.length*100)+'%':'0%';
}

// ---- SAVE/LOAD ----
function saveProgress(){
  const state={};
  chapters.forEach(ch=>{
    const tbody=document.getElementById('tb'+ch);
    if(!tbody)return;
    state['ch'+ch]=Array.from(tbody.querySelectorAll('input')).map(i=>i.checked);
  });
  try{localStorage.setItem('calc_prog',JSON.stringify(state));}catch(e){}
}
function loadProgress(){
  let state;
  try{state=JSON.parse(localStorage.getItem('calc_prog')||'null');}catch(e){}
  if(!state)return;
  chapters.forEach(ch=>{
    const tbody=document.getElementById('tb'+ch);
    if(!tbody||!state['ch'+ch])return;
    tbody.querySelectorAll('input').forEach((inp,i)=>{
      if(state['ch'+ch][i]){
        inp.checked=true;
        const row=inp.closest('tr');
        if(row)row.querySelectorAll('span').forEach(s=>s.classList.add('done-text'));
      }
    });
    chkChange(ch,tbody.querySelector('input')||{});
  });
  updateGlobal();
}

// ---- DAILY LOG ----
function getLog(){try{return JSON.parse(localStorage.getItem('calc_log')||'[]');}catch(e){return[];}}
function saveLog(data){try{localStorage.setItem('calc_log',JSON.stringify(data));}catch(e){}}
function addLog(){
  const date=document.getElementById('l-date').value;
  const section=document.getElementById('l-section').value.trim();
  const problems=parseInt(document.getElementById('l-problems').value)||0;
  const diff=document.getElementById('l-diff').value;
  if(!date||!section||problems<0)return;
  const log=getLog();
  log.unshift({date,section,problems,diff,id:Date.now()});
  saveLog(log);renderLog();
  document.getElementById('l-section').value='';
  document.getElementById('l-problems').value='';
}
function deleteLog(id){
  const log=getLog().filter(e=>e.id!==id);
  saveLog(log);renderLog();
}
function renderLog(){
  const log=getLog();
  const tbody=document.getElementById('log-tbody');
  if(!log.length){tbody.innerHTML='<tr><td colspan="5" class="empty-log">No entries yet. Log your first session above.</td></tr>';updateLogStats([]);renderChart([]);return;}
  tbody.innerHTML=log.map(e=>`<tr><td>${e.date}</td><td>Section ${e.section}</td><td>${e.problems}</td><td><span class="diff-${e.diff}">${e.diff==='easy'?'Easy':e.diff==='ok'?'Ok':'Hard'}</span></td><td><button class="del-btn" onclick="deleteLog(${e.id})">Remove</button></td></tr>`).join('');
  updateLogStats(log);renderChart(log);
}
function updateLogStats(log){
  const days=new Set(log.map(e=>e.date)).size;
  const total=log.reduce((s,e)=>s+e.problems,0);
  document.getElementById('l-days').textContent=days;
  document.getElementById('l-total-p').textContent=total;
  document.getElementById('l-avg').textContent=days?Math.round(total/days):0;
  // streak
  const dates=[...new Set(log.map(e=>e.date))].sort().reverse();
  let streak=0;
  const today=new Date().toISOString().split('T')[0];
  let cur=today;
  for(const d of dates){if(d===cur){streak++;const dt=new Date(cur);dt.setDate(dt.getDate()-1);cur=dt.toISOString().split('T')[0];}else break;}
  document.getElementById('l-streak').textContent=streak;
}
function renderChart(log){
  const area=document.getElementById('chart-area');
  const days=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0]);}
  const byDay={};
  log.forEach(e=>{byDay[e.date]=(byDay[e.date]||0)+e.problems;});
  const vals=days.map(d=>byDay[d]||0);
  const max=Math.max(...vals,1);
  area.innerHTML=days.map((d,i)=>{
    const v=vals[i];
    const h=Math.round((v/max)*130);
    const label=d.slice(5);
    return`<div class="chart-bar-wrap"><div class="chart-val">${v||''}</div><div class="chart-bar" style="height:${h}px;background:${v?'var(--teal-mid)':'var(--bg3)'}"></div><div class="chart-day">${label}</div></div>`;
  }).join('');
}
